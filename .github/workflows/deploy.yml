name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. Deploy Backend → Render
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy (Backend)
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" ]; then
            echo "ERROR: RENDER_BACKEND_DEPLOY_HOOK secret is not set."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}")

          echo "HTTP Status: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            echo "Backend deploy triggered successfully."
          else
            echo "ERROR: Deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 2. Deploy ML Service → Render
  # ─────────────────────────────────────────────
  deploy-ml:
    name: Deploy ML Service to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy (ML Service)
        run: |
          if [ -z "${{ secrets.RENDER_ML_DEPLOY_HOOK }}" ]; then
            echo "ERROR: RENDER_ML_DEPLOY_HOOK secret is not set."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST "${{ secrets.RENDER_ML_DEPLOY_HOOK }}")

          echo "HTTP Status: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            echo "ML Service deploy triggered successfully."
          else
            echo "ERROR: Deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 3. Deploy Frontend → Vercel
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Expo Web
        working-directory: frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Prepare Vercel output
        working-directory: frontend
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy prebuilt to Vercel
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}


